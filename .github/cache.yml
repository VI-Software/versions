name: Refresh API Cache

on:
  push:
    branches:
      - main
    paths:
      - versions.json

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update lastUpdated timestamp
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          python3 << EOF
          import json
          with open('versions.json', 'r') as f:
              data = json.load(f)
          data['lastUpdated'] = '$TIMESTAMP'
          with open('versions.json', 'w') as f:
              json.dump(data, f, indent=2)
          EOF
      
      - name: Commit and push timestamp update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update lastUpdated timestamp [skip ci]"
            git push
          fi
      
      - name: Trigger API cache refresh
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            https://api.visoftware.dev/services/launcher/v2/refresh-cache \
            -H "x-cache-token: ${{ secrets.LAUNCHER_CACHE_REFRESH_TOKEN }}" \
            -H "Content-Type: application/json")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Cache refresh successful (HTTP $http_code)"
            echo "$body"
          else
            echo "Cache refresh failed (HTTP $http_code)"
            echo "$body"
            exit 1
          fi
      
      - name: Notify success
        if: success()
        run: |
          echo "::notice:: Cache refreshed successfully"
      
      - name: Notify failure
        if: failure()
        run: |
          echo "::error:: Failed to refresh cache"